services:
  postgres:
    image: postgres:15-alpine
    container_name: universal-cart-postgres
    environment:
      POSTGRES_DB: universal_cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: universal-cart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: universal-cart-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/universal_cart
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: development
      AUTH_SECRET: docker-dev-auth-secret
      ENABLE_MOCK_PAYMENTS: "true"
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    command: >
      sh -c "npx prisma generate --schema apps/api/prisma/schema.prisma &&
             npx prisma migrate deploy --schema apps/api/prisma/schema.prisma &&
             npm run dev --workspace=@universal-cart/api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: universal-cart-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    command: npm run dev --workspace=@universal-cart/web

volumes:
  postgres_data:
  redis_data:
