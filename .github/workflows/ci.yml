name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: universal_cart
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d universal_cart"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/universal_cart
      NODE_ENV: test
      AUTH_SECRET: ci-auth-secret
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=@universal-cart/api

      - name: Prepare database schema
        run: npm run prisma:migrate:deploy --workspace=@universal-cart/api

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end smoke tests
        run: npm run test:e2e

      - name: Validate OpenAPI
        run: npm run validate:openapi

      - name: Security audit
        run: npm run security:audit

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Load smoke test
        env:
          K6_API_BASE_URL: http://127.0.0.1:3001
          K6_SMOKE: 'true'
          K6_VUS: '3'
        run: |
          npm run start --workspace=@universal-cart/api &
          API_PID=$!
          trap "kill $API_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health/ready; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3001/health/ready
          npm run test:load

      - name: Production smoke checks
        run: npm run test:smoke

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-cart-ci-artifacts
          if-no-files-found: ignore
          path: |
            coverage
            test-results
            playwright-report
            apps/api/error.log
            apps/api/combined.log
