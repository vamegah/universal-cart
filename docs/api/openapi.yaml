      responses:
        '200':
          description: OpenAPI YAML document
      security: []
  /docs/ui:
    get:
      summary: View interactive API documentation
      tags:
        - docs
      responses:
        '200':
          description: Swagger UI HTML
      security: []
  /auth/refresh:
    post:
      summary: Rotate the current persisted session token
      tags:
        - auth
      responses:
        '200':
          description: Session refreshed
        '401':
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      summary: Revoke the current persisted client session
      tags:
        - auth
      responses:
        '204':
          description: Logged out
