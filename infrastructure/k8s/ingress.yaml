apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: universal-cart-ingress
  namespace: universal-cart
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - universalcart.com
    - api.universalcart.com
    secretName: universalcart-tls
  rules:
  - host: universalcart.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
  - host: api.universalcart.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80