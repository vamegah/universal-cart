name: Deploy API

on:
  push:
    tags:
      - 'api-v*'
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: universal-cart-api
  EKS_CLUSTER: universal-cart-eks
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  validate:
    name: Validate before deploy
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: universal_cart
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d universal_cart"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/universal_cart
      NODE_ENV: test
      AUTH_SECRET: ci-auth-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=@universal-cart/api
      - name: Prepare database schema
        run: npm run prisma:migrate:deploy --workspace=@universal-cart/api
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: End-to-end smoke tests
        run: npm run test:e2e
      - name: Validate OpenAPI
        run: npm run validate:openapi
      - name: Security audit
        run: npm run security:audit
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Load smoke test
        env:
          K6_API_BASE_URL: http://127.0.0.1:3001
          K6_SMOKE: 'true'
          K6_VUS: '3'
        run: |
          npm run start --workspace=@universal-cart/api &
          API_PID=$!
          trap "kill $API_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health/ready; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3001/health/ready
          npm run test:load
      - name: Production smoke checks
        run: npm run test:smoke

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.DEPLOY_SHA }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - name: Update Kubernetes deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
          kubectl set image deployment/universal-cart-api api=$ECR_REGISTRY/$ECR_REPOSITORY:${{ env.DEPLOY_SHA }} -n universal-cart
          kubectl rollout status deployment/universal-cart-api -n universal-cart
      - name: Deployed API health check
        env:
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL || secrets.API_HEALTH_URL }}
          REQUIRE_API_HEALTH_URL: 'true'
        run: node scripts/production-health-check.js
