            type: string
  /autobuy:
    get:
      summary: List auto-buy rules
      tags:
        - autobuy
      responses:
        '200':
          description: Auto-buy rules
    post:
      summary: Create an auto-buy rule
      tags:
        - autobuy
      responses:
        '201':
          description: Rule created
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /autobuy/{id}:
    patch:
      summary: Update an auto-buy rule
      tags:
