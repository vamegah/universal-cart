apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-cart-api
  namespace: universal-cart
  labels:
    app: universal-cart
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: universal-cart
      component: api
  template:
    metadata:
      labels:
        app: universal-cart
        component: api
    spec:
      containers:
      - name: api
        image: universal-cart/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: universal-cart
spec:
  selector:
    app: universal-cart
    component: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  type: ClusterIP