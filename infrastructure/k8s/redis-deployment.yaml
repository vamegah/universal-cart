apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: universal-cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: universal-cart
      component: redis
  template:
    metadata:
      labels:
        app: universal-cart
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: universal-cart
spec:
  selector:
    app: universal-cart
    component: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP