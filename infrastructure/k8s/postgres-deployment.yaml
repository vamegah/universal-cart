apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: universal-cart
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: universal-cart
      component: postgres
  template:
    metadata:
      labels:
        app: universal-cart
        component: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: universal_cart
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: universal-cart
spec:
  selector:
    app: universal-cart
    component: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP