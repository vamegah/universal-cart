  /admin/matches/{matchId}/reject:
    post:
      summary: Admin rejects a match candidate or blacklists listing
      tags:
        - admin
      responses:
        '200':
          description: Match rejected
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  schemas:
    HealthLive:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: universal-cart-api
        timestamp:
          type: string
          format: date-time
    HealthReady:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        service:
          type: string
          example: universal-cart-api
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          additionalProperties: true
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        sessionId:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/PublicUser'
    PublicUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
    Profile:
      type: object
      properties:
        preferences:
          type: object
          nullable: true
        cards:
          type: array
          items:
            $ref: '#/components/schemas/PublicCard'
    PreferencesInput:
      type: object
      properties:
        defaultStore:
          type: string
          nullable: true
        defaultCardId:
          type: string
          nullable: true
        shippingPref:
          type: object
          nullable: true
    CardInput:
      type: object
      required:
        - retailerName
        - cardToken
        - cardLast4
        - consentAccepted
      properties:
        retailerName:
          type: string
        cardToken:
          type: string
          description: Tokenized provider reference such as tok_*, pm_*, card_*, src_*, or vc_*; raw PAN/CVV values are rejected.
        cardLast4:
          type: string
          pattern: ^[0-9]{4}$
        rewardsRate:
          type: number
          minimum: 0
          maximum: 1
        consentAccepted:
          type: boolean
          const: true
          description: User confirmation that this is a tokenized reference and may be stored for rewards/preferences.
        financingTerms:
          type: object
          nullable: true
    PublicCard:
      type: object
      properties:
        id:
          type: string
        retailerName:
          type: string
        cardLast4:
          type: string
        rewardsRate:
          type: number
        financingTerms:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
    ImportedProduct:
      type: object
      properties:
        id:
          type: string
        cartItemId:
          type: string
        retailerProductId:
          type: string
        sourceRetailer:
          type: string
        productName:
          type: string
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        url:
          type: string
    ProductSearchResponse:
      type: object
      properties:
        query:
          type: string
        retailer:
          type: string
          nullable: true
        results:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
              retailerRank:
                type: integer
              productId:
                type: string
              retailerProductId:
                type: string
              retailerSku:
                type: string
              sourceRetailer:
                type: string
              productName:
                type: string
              price:
                type: number
              imageUrl:
                type: string
                nullable: true
              url:
                type: string
              brand:
                type: string
                nullable: true
              model:
                type: string
                nullable: true
              upc:
                type: string
                nullable: true
              category:
                type: string
                nullable: true
        errors:
          type: array
          items:
            type: object
            properties:
              retailer:
                type: string
              error:
                type: string
    UniversalCart:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        status:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
    CartItem:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        sourceRetailer:
          type: string
        quantity:
          type: integer
        matchType:
          type: string
          nullable: true
        matchConfidence:
          type: number
          nullable: true
        confidenceScore:
          type: number
          nullable: true
        selectedRetailerProductId:
          type: string
          nullable: true
        matchedRetailer:
          type: string
          nullable: true
        matchedPrice:
          type: number
          nullable: true
        matchedUrl:
          type: string
          nullable: true
        product:
          $ref: '#/components/schemas/Product'
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brand:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        upc:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
    MatchResult:
      type: object
      properties:
        matchType:
          type: string
          enum:
            - exact
            - similar
            - substitute
            - none
        confidence:
          type: number
        reason:
          type: string
        retailerProduct:
          $ref: '#/components/schemas/RetailerProduct'
    RetailerProduct:
      type: object
      properties:
        id:
          type: string
        retailerName:
          type: string
        retailerSku:
          type: string
        price:
          type: number
        url:
          type: string
        inStock:
          type: boolean
        sellerName:
          type: string
          nullable: true
        isAuthorizedSeller:
          type: boolean
        returnWindowDays:
          type: integer
          nullable: true
        warrantySupport:
          type: boolean
        customerRating:
          type: number
          nullable: true
        counterfeitRisk:
          type: string
          enum:
            - unknown
            - low
            - medium
            - high
        sellerTrustScore:
          type: integer
          minimum: 0
          maximum: 100
        sellerTrustLabel:
          type: string
          enum:
            - strong
            - acceptable
            - review
        sellerTrustSignals:
          type: array
          items:
            type: string
    PricingComparison:
      type: object
      properties:
        cartItemId:
          type: string
        source:
          type: object
          nullable: true
        destination:
          type: object
        recommendation:
          type: object
    BudgetSummary:
      type: object
      properties:
        currentMonthSpend:
          type: number
        currentMonthCheckouts:
          type: integer
        monthlyFinancingCap:
          type: number
          nullable: true
        maxOrderBudget:
          type: number
          nullable: true
        preferredInstallmentAmount:
          type: number
          nullable: true
        capUsedPercent:
          type: integer
          nullable: true
        alerts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              message:
                type: string
    CheckoutRequest:
      type: object
      required:
        - items
        - store
      properties:
        items:
          type: array
          items:
            type: object
        store:
          type: string
