      responses:
        '200':
          description: Global analytics
        '403':
          $ref: '#/components/responses/Error'
  /admin/seller-trust:
    get:
      summary: Admin seller trust review queue
      tags:
        - admin
      responses:
        '200':
          description: Seller trust queue
        '403':
          $ref: '#/components/responses/Error'
  /admin/seller-trust/{retailerProductId}:
    patch:
      summary: Admin updates seller trust signals
      tags:
        - admin
      responses:
        '200':
          description: Seller trust listing updated
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      parameters:
        - name: retailerProductId
          in: path
          required: true
          schema:
