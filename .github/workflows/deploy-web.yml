name: Deploy Web

on:
  push:
    tags:
      - 'web-v*'
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  validate:
    name: Validate before deploy
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: universal_cart
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d universal_cart"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/universal_cart
      NODE_ENV: test
      AUTH_SECRET: ci-auth-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=@universal-cart/api
      - name: Prepare database schema
        run: npm run prisma:migrate:deploy --workspace=@universal-cart/api
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: End-to-end smoke tests
        run: npm run test:e2e
      - name: Validate OpenAPI
        run: npm run validate:openapi
      - name: Security audit
        run: npm run security:audit
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Load smoke test
        env:
          K6_API_BASE_URL: http://127.0.0.1:3001
          K6_SMOKE: 'true'
          K6_VUS: '3'
        run: |
          npm run start --workspace=@universal-cart/api &
          API_PID=$!
          trap "kill $API_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health/ready; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3001/health/ready
          npm run test:load
      - name: Production smoke checks
        run: npm run test:smoke

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || secrets.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Require deployed API URL
        run: |
          test -n "$NEXT_PUBLIC_API_URL" || (echo "NEXT_PUBLIC_API_URL must be set as a repository variable or secret for static web deploys" && exit 1)
      - name: Install dependencies
        run: npm ci
      - name: Build static web bundle
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build --workspace=@universal-cart/web
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy to S3
        run: |
          aws s3 sync apps/web/out/ s3://universal-cart-web --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"
      - name: Deployed web health check
        env:
          WEB_HEALTH_URL: ${{ vars.WEB_HEALTH_URL || secrets.WEB_HEALTH_URL }}
          THIRD_PARTY_HEALTH_URLS: ${{ vars.THIRD_PARTY_HEALTH_URLS || secrets.THIRD_PARTY_HEALTH_URLS }}
          REQUIRE_WEB_HEALTH_URL: 'true'
        run: node scripts/production-health-check.js
